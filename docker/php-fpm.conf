[www]
; Keep the pool tuned for a small (1 vCPU) VPS such as Hostinger KVM1.
pm = dynamic
pm.max_children = 12
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

; Send worker output to the container log
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
